<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComEd Pricing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">

    <!-- External Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- App Logic -->
    <script src="app.js" defer></script>
</head>
<body class="bg-zinc-950 text-white">
    <div class="max-w-md mx-auto min-h-screen app-shell">

        <!-- Header -->
        <div class="sticky top-0 z-50 bg-zinc-950/95 backdrop-blur border-b border-zinc-800 px-6 py-4 flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-semibold tracking-tight">ComEd</h1>
                <p class="text-[10px] text-zinc-400 -mt-0.5">ELECTRICITY PRICING</p>
            </div>
            <button onclick="loadData(true)" 
                    class="px-4 h-9 bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 rounded-2xl text-sm font-medium transition-colors">
                Refresh
            </button>
        </div>

        <!-- Live Prices Tab -->
        <div id="live-tab-content">

            <!-- Current Price -->
            <div class="live-now-wrap">
                <div class="glass now-card">
                    <div class="now-card-content">
                        <div class="now-card-main">
                            <div class="now-card-label">NOW</div>
                            <div id="current-price" class="current-price-value">--</div>
                            <div id="current-time" class="current-price-time">Loading...</div>
                        </div>
                        <div class="now-card-emoji-wrap">
                            <div id="current-emoji" class="current-emoji">⏳</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Stats -->
            <div class="px-6 mt-6 stats-section">
                <div id="stats-header" class="stats-header">LAST 24 HOURS</div>
                <div class="grid grid-cols-3 gap-3 stats-grid">
                    <button type="button" data-live-stat-detail="avg" class="glass border border-zinc-800 rounded-2xl p-4 price-stat-card avg clickable-scorecard">
                        <div class="text-emerald-400 text-[10px] font-semibold tracking-wider stat-label">AVG</div>
                        <div id="avg-price" class="scorecard-value text-3xl font-semibold mt-1 stat-value">--</div>
                    </button>
                    <button type="button" data-live-stat-detail="high" class="glass border border-zinc-800 rounded-2xl p-4 price-stat-card high clickable-scorecard">
                        <div class="text-red-400 text-[10px] font-semibold tracking-wider stat-label">HIGH</div>
                        <div id="high-price" class="scorecard-value text-3xl font-semibold mt-1 stat-value">--</div>
                    </button>
                    <button type="button" data-live-stat-detail="low" class="glass border border-zinc-800 rounded-2xl p-4 price-stat-card low clickable-scorecard">
                        <div class="text-sky-400 text-[10px] font-semibold tracking-wider stat-label">LOW</div>
                        <div id="low-price" class="scorecard-value text-3xl font-semibold mt-1 stat-value">--</div>
                    </button>
                </div>
                <div id="live-stat-detail" class="scorecard-detail-panel hidden"></div>
            </div>

            <!-- Time Filters -->
            <div class="px-6 mt-6">
                <div class="filter-container">
                    <span class="filter-label">SHOW</span>
                    <div class="filter-buttons">
                        <button onclick="filterData(6)" data-hours="6" class="filter-btn">6h</button>
                        <button onclick="filterData(12)" data-hours="12" class="filter-btn">12h</button>
                        <button onclick="filterData(24)" data-hours="24" class="filter-btn active">24h</button>
                        <button onclick="filterData(168)" data-hours="168" class="filter-btn">7d</button>
                        <button onclick="filterData(720)" data-hours="720" class="filter-btn">30d</button>
                    </div>
                </div>
            </div>

            <!-- Chart -->
            <div class="px-6 mt-4">
                <div class="glass border border-zinc-800 rounded-2xl p-4 h-64">
                    <canvas id="price-chart"></canvas>
                </div>
            </div>

            <!-- Recent Readings -->
            <div class="px-6 mt-6">
                <div class="px-1 mb-3">
                    <span class="text-sm font-semibold">Recent Readings</span>
                </div>
                <div id="recent-list" class="space-y-[6px]"></div>
                <div class="recent-readings-meta">
                    <span id="reading-count" class="reading-count-meta"></span>
                </div>

                <button id="load-more-btn" onclick="loadMore()"
                        class="mt-4 w-full py-3 bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 rounded-2xl text-sm font-medium hidden">
                    Load More
                </button>
            </div>

        </div>

        <!-- My Bills Tab -->
        <div id="bills-tab-content" class="hidden px-6">
            <div class="grid grid-cols-2 gap-3 mt-6">
                <button type="button" data-bills-summary-detail="total-bills" class="glass border border-zinc-800 rounded-2xl p-4 clickable-scorecard">
                    <div class="text-xs text-zinc-400">TOTAL BILLS</div>
                    <div id="total-bills" class="text-3xl font-semibold mt-1">--</div>
                </button>
                <button type="button" data-bills-summary-detail="total-spent" class="glass border border-zinc-800 rounded-2xl p-4 clickable-scorecard">
                    <div class="text-xs text-zinc-400">TOTAL SPENT</div>
                    <div id="total-spent" class="text-3xl font-semibold mt-1">--</div>
                </button>
                <button type="button" data-bills-summary-detail="avg-effective-rate" class="glass border border-zinc-800 rounded-2xl p-4 clickable-scorecard">
                    <div class="text-xs text-zinc-400">AVG EFFECTIVE RATE</div>
                    <div id="avg-effective-rate" class="text-3xl font-semibold mt-1">--</div>
                </button>
                <button type="button" data-bills-summary-detail="avg-vs-market" class="glass border border-zinc-800 rounded-2xl p-4 clickable-scorecard">
                    <div class="text-xs text-zinc-400">AVG VS MARKET</div>
                    <div id="avg-vs-market" class="text-3xl font-semibold mt-1">--</div>
                </button>
            </div>
            <div id="bills-summary-detail" class="scorecard-detail-panel hidden"></div>
            <div class="glass border border-zinc-800 rounded-2xl p-4 mt-3">
                <div class="flex items-center justify-between mb-2">
                    <div class="text-xs text-zinc-400 tracking-wider">BILL COST BREAKDOWN</div>
                    <div id="bill-breakdown-caption" class="text-[11px] text-zinc-500">Supply / Delivery / Taxes & Fees</div>
                </div>
                <div class="bill-breakdown-chart-wrap">
                    <canvas id="bill-breakdown-chart"></canvas>
                </div>
            </div>

            <div class="glass border border-zinc-800 rounded-2xl p-4 mt-4">
                <div class="text-sm font-semibold">Monthly Usage vs. Spend & Efficiency</div>
                <div class="text-[11px] text-zinc-500 mt-0.5">Comparing monthly kWh usage and total spend.</div>
                <div id="usage-vs-spend-insight" class="usage-insight-card mt-3 text-sm rounded-xl px-3 py-2">
                    Loading usage insight...
                </div>
                <div class="mt-3 h-56">
                    <canvas id="usage-vs-spend-chart"></canvas>
                </div>
            </div>

            <div class="mt-6">
                <div class="flex justify-between mb-3">
                    <span class="text-sm font-semibold">Bill History</span>
                    <span id="bill-count" class="text-xs text-zinc-500"></span>
                </div>
                <div id="bill-season-filters" class="bill-season-filters"></div>
                <div id="bills-list" class="space-y-3"></div>
            </div>
        </div>

    </div>

    <!-- Bottom App Navigation -->
    <div class="bottom-tab-shell">
        <div class="bottom-tab-bar">
            <button onclick="switchTab('live')" id="tab-live"
                    class="tab-button bottom-tab-button active">
                Live Prices
            </button>
            <button onclick="switchTab('bills')" id="tab-bills"
                    class="tab-button bottom-tab-button">
                My Bills
            </button>
        </div>
    </div>

    <!-- Bill Modal -->
    <div id="bill-modal" onclick="closeBillModal()" class="hidden fixed inset-0 bg-black/70 items-end justify-center z-[100]">
        <div onclick="event.stopImmediatePropagation()" class="glass bill-modal-panel w-full max-w-md rounded-t-3xl p-6">
            <div class="flex justify-between mb-4">
                <div class="font-semibold text-lg" id="modal-period"></div>
                <button onclick="closeBillModal()" class="text-2xl">&times;</button>
            </div>
            <div class="space-y-4 text-sm" id="modal-content">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

</body>
</html>
