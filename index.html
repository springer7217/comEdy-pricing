<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComEd Pricing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .price-card { transition: transform 0.2s ease; }
        .price-card:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-zinc-950 text-white">
    <div class="max-w-md mx-auto min-h-screen">
        <!-- Header -->
        <div class="px-6 pt-8 pb-4 flex items-center justify-between">
            <div>
                <h1 class="text-3xl font-semibold tracking-tight">ComEd Pricing</h1>
                <p class="text-zinc-400 text-sm">Live + Historical</p>
            </div>
            <button onclick="loadData()" 
                    class="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm font-medium flex items-center gap-2 transition-colors">
                <span>Refresh</span>
            </button>
        </div>

        <!-- Current Price -->
        <div class="px-6">
            <div id="current-price-card" 
                 class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6 price-card">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-zinc-400 text-sm font-medium">CURRENT PRICE</p>
                        <div id="current-price" class="text-6xl font-semibold tracking-tighter mt-1">--</div>
                        <p id="current-time" class="text-zinc-500 text-sm mt-1">Loading...</p>
                    </div>
                    <div id="current-emoji" class="text-7xl">⏳</div>
                </div>
            </div>
        </div>

        <!-- Stats -->
        <div class="px-6 mt-6">
            <h2 class="text-sm font-semibold text-zinc-400 px-1 mb-3">LAST 24 HOURS</h2>
            <div class="grid grid-cols-3 gap-3">
                <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-4">
                    <div class="text-emerald-400 text-xs font-medium">AVERAGE</div>
                    <div id="avg-price" class="text-3xl font-semibold mt-1">--</div>
                </div>
                <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-4">
                    <div class="text-red-400 text-xs font-medium">HIGH</div>
                    <div id="high-price" class="text-3xl font-semibold mt-1">--</div>
                </div>
                <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-4">
                    <div class="text-blue-400 text-xs font-medium">LOW</div>
                    <div id="low-price" class="text-3xl font-semibold mt-1">--</div>
                </div>
            </div>
        </div>

        <!-- Recent Prices -->
        <div class="px-6 mt-8">
            <div class="flex items-center justify-between px-1 mb-3">
                <h2 class="text-sm font-semibold text-zinc-400">RECENT READINGS</h2>
                <span id="reading-count" class="text-xs text-zinc-500"></span>
            </div>
            
            <div id="recent-list" class="space-y-2">
                <!-- Populated by JavaScript -->
            </div>
        </div>

        <div class="h-20"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://qgasjpfbzjqlheexlouw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFnYXNqcGZiempxbGhlZXhsb3V3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwMzc2OTgsImV4cCI6MjA5ODYxMzY5OH0.cdZFeiMTV8zoQxgXI9-mLWNxmj9-r2eVoRZt9vfyaSk';

        function getEmoji(price) {
            if (price <= 8.0) return '🟢';
            if (price <= 10.0) return '🟡';
            return '🔴';
        }

        async function loadData() {
            const recentList = document.getElementById('recent-list');
            recentList.innerHTML = '<div class="text-center py-8 text-zinc-500">Loading...</div>';

            try {
                // Fetch last 100 records
                const response = await fetch(
                    `${SUPABASE_URL}/rest/v1/comed_prices?select=*&order=recorded_at.desc&limit=100`,
                    {
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                        }
                    }
                );

                if (!response.ok) throw new Error('Failed to fetch data');

                const data = await response.json();

                if (data.length === 0) {
                    recentList.innerHTML = '<div class="text-center py-8 text-zinc-500">No data yet</div>';
                    return;
                }

                // Current price
                const latest = data[0];
                const latestPrice = parseFloat(latest.price);
                
                document.getElementById('current-price').innerHTML = `${latestPrice.toFixed(1)}<span class="text-3xl font-normal">¢</span>`;
                document.getElementById('current-emoji').innerHTML = getEmoji(latestPrice);
                
                const recordedDate = new Date(latest.recorded_at);
                document.getElementById('current-time').innerHTML = 
                    `as of ${recordedDate.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })}`;

                // Calculate 24h stats (last ~144 records = 24 hours at 10min intervals)
                const last24h = data.slice(0, 144);
                const prices = last24h.map(r => parseFloat(r.price));
                
                const avg = prices.reduce((a, b) => a + b, 0) / prices.length;
                const high = Math.max(...prices);
                const low = Math.min(...prices);

                document.getElementById('avg-price').innerHTML = avg.toFixed(1) + '¢';
                document.getElementById('high-price').innerHTML = high.toFixed(1) + '¢';
                document.getElementById('low-price').innerHTML = low.toFixed(1) + '¢';

                // Recent readings list
                recentList.innerHTML = '';
                data.slice(0, 25).forEach(record => {
                    const price = parseFloat(record.price);
                    const time = new Date(record.recorded_at);
                    
                    const div = document.createElement('div');
                    div.className = 'flex items-center justify-between bg-zinc-900 border border-zinc-800 rounded-2xl px-4 py-3';
                    div.innerHTML = `
                        <div class="flex items-center gap-3">
                            <span class="text-2xl">${getEmoji(price)}</span>
                            <div>
                                <div class="font-semibold">${price.toFixed(1)}¢</div>
                                <div class="text-xs text-zinc-500">${time.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} ${time.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })}</div>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-xs text-zinc-500">${time.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })}</div>
                        </div>
                    `;
                    recentList.appendChild(div);
                });

                document.getElementById('reading-count').innerHTML = `${data.length} readings`;

            } catch (error) {
                console.error(error);
                recentList.innerHTML = `<div class="text-center py-8 text-red-400">Error loading data</div>`;
            }
        }

        // Load data on page load
        window.onload = loadData;

        // Optional: Auto refresh every 5 minutes
        setInterval(loadData, 5 * 60 * 1000);
    </script>
</body>
</html>
