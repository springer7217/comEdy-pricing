<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComEd Pricing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .glass { background: rgba(39, 39, 42, 0.8); backdrop-filter: blur(20px); }
        .price-value { font-variant-numeric: tabular-nums; }
        .skeleton { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-zinc-950 text-white">
    <div class="max-w-md mx-auto min-h-screen pb-8">
        <!-- Header -->
        <div class="sticky top-0 z-50 bg-zinc-950/95 backdrop-blur-lg border-b border-zinc-800 px-6 py-4 flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-semibold tracking-tight">ComEd</h1>
                <p class="text-[10px] text-zinc-500 -mt-0.5">ELECTRICITY PRICING</p>
            </div>
            <button onclick="loadData(true)" 
                    class="flex items-center gap-2 px-4 h-9 bg-zinc-900 hover:bg-zinc-800 active:bg-zinc-700 transition-colors rounded-2xl text-sm font-medium border border-zinc-800">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.058 11H1M12 3v2m0 16v2m9-9H15m-6 0a8.002 8.002 0 01-3.464-1.06" />
                </svg>
                <span>Refresh</span>
            </button>
        </div>

        <!-- Current Price -->
        <div class="px-6 pt-6">
            <div id="current-card" class="glass border border-zinc-800 rounded-3xl p-6">
                <div class="flex justify-between items-start">
                    <div>
                        <div class="text-xs tracking-[1px] text-zinc-400 font-medium">NOW</div>
                        <div id="current-price" class="text-[64px] leading-none font-semibold tracking-[-3.5px] mt-2 price-value">--</div>
                        <div id="current-time" class="text-sm text-zinc-500 mt-1">Loading latest price...</div>
                    </div>
                    <div id="current-emoji" class="text-[72px] mt-1 transition-transform">⏳</div>
                </div>
            </div>
        </div>

        <!-- 24h Stats -->
        <div class="px-6 mt-6">
            <div class="flex items-center justify-between px-1 mb-3">
                <div class="text-xs uppercase tracking-widest text-zinc-400 font-medium">Last 24 Hours</div>
            </div>
            
            <div class="grid grid-cols-3 gap-3">
                <!-- Average -->
                <div class="glass border border-zinc-800 rounded-2xl p-4">
                    <div class="text-emerald-400 text-[10px] font-semibold tracking-wider">AVG</div>
                    <div id="avg-price" class="text-4xl font-semibold tracking-tight mt-1 price-value">--</div>
                    <div class="text-[10px] text-zinc-500 mt-0.5">per kWh</div>
                </div>
                
                <!-- High -->
                <div class="glass border border-zinc-800 rounded-2xl p-4">
                    <div class="text-red-400 text-[10px] font-semibold tracking-wider">HIGH</div>
                    <div id="high-price" class="text-4xl font-semibold tracking-tight mt-1 price-value">--</div>
                    <div class="text-[10px] text-zinc-500 mt-0.5">per kWh</div>
                </div>
                
                <!-- Low -->
                <div class="glass border border-zinc-800 rounded-2xl p-4">
                    <div class="text-sky-400 text-[10px] font-semibold tracking-wider">LOW</div>
                    <div id="low-price" class="text-4xl font-semibold tracking-tight mt-1 price-value">--</div>
                    <div class="text-[10px] text-zinc-500 mt-0.5">per kWh</div>
                </div>
            </div>
        </div>

        <!-- Recent Readings -->
        <div class="px-6 mt-8">
            <div class="flex items-baseline justify-between px-1 mb-3">
                <div>
                    <span class="text-sm font-semibold">Recent Readings</span>
                </div>
                <span id="reading-count" class="text-xs text-zinc-500"></span>
            </div>

            <div id="recent-list" class="space-y-[6px]">
                <!-- Populated dynamically -->
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://qgasjpfbzjqlheexlouw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFnYXNqcGZiempxbGhlZXhsb3V3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwMzc2OTgsImV4cCI6MjA5ODYxMzY5OH0.cdZFeiMTV8zoQxgXI9-mLWNxmj9-r2eVoRZt9vfyaSk';

        function getEmoji(price) {
            if (price <= 8.0) return '🟢';
            if (price <= 10.0) return '🟡';
            return '🔴';
        }

        function showSkeleton() {
            document.getElementById('current-price').innerHTML = '<div class="h-16 w-40 bg-zinc-800 rounded-2xl skeleton"></div>';
            document.getElementById('current-emoji').innerHTML = '⏳';
            document.getElementById('avg-price').innerHTML = '--';
            document.getElementById('high-price').innerHTML = '--';
            document.getElementById('low-price').innerHTML = '--';
            document.getElementById('recent-list').innerHTML = 
                '<div class="space-y-2">' + 
                Array(6).fill(0).map(() => 
                    `<div class="h-14 bg-zinc-900 border border-zinc-800 rounded-2xl skeleton"></div>`
                ).join('') + 
                '</div>';
        }

        async function loadData(showLoading = true) {
            if (showLoading) showSkeleton();

            try {
                const res = await fetch(
                    `${SUPABASE_URL}/rest/v1/comed_prices?select=*&order=recorded_at.desc&limit=120`,
                    {
                        headers: {
                            apikey: SUPABASE_ANON_KEY,
                            Authorization: `Bearer ${SUPABASE_ANON_KEY}`
                        }
                    }
                );

                if (!res.ok) throw new Error('Failed to load data');

                const data = await res.json();

                if (!data.length) {
                    document.getElementById('recent-list').innerHTML = 
                        '<div class="text-center py-10 text-zinc-500 text-sm">No data available yet</div>';
                    return;
                }

                // === Current Price ===
                const latest = data[0];
                const price = parseFloat(latest.price);
                
                document.getElementById('current-price').innerHTML = 
                    `${price.toFixed(1)}<span class="text-4xl font-normal align-super">¢</span>`;
                document.getElementById('current-emoji').innerHTML = getEmoji(price);
                
                const recorded = new Date(latest.recorded_at);
                document.getElementById('current-time').innerHTML = 
                    `Updated ${recorded.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })}`;

                // === 24h Stats ===
                const last24h = data.slice(0, 144);
                const prices = last24h.map(r => parseFloat(r.price));
                
                const avg = prices.reduce((sum, p) => sum + p, 0) / prices.length;
                const high = Math.max(...prices);
                const low = Math.min(...prices);

                document.getElementById('avg-price').innerHTML = avg.toFixed(1) + '¢';
                document.getElementById('high-price').innerHTML = high.toFixed(1) + '¢';
                document.getElementById('low-price').innerHTML = low.toFixed(1) + '¢';

                // === Recent List ===
                const container = document.getElementById('recent-list');
                container.innerHTML = '';

                data.slice(0, 30).forEach(row => {
                    const p = parseFloat(row.price);
                    const time = new Date(row.recorded_at);
                    
                    const el = document.createElement('div');
                    el.className = `flex items-center justify-between px-4 py-[14px] bg-zinc-900/70 border border-zinc-800 rounded-2xl`;
                    
                    el.innerHTML = `
                        <div class="flex items-center gap-3.5">
                            <span class="text-3xl">${getEmoji(p)}</span>
                            <div>
                                <div class="font-semibold text-xl tracking-tight price-value">${p.toFixed(1)}<span class="text-sm font-normal text-zinc-400">¢</span></div>
                                <div class="text-[10px] text-zinc-500 -mt-0.5">
                                    ${time.toLocaleDateString([], {month:'short', day:'numeric'})} · ${time.toLocaleTimeString([], {hour:'numeric', minute:'2-digit'})}
                                </div>
                            </div>
                        </div>
                        <div class="text-right text-xs text-zinc-400 font-mono">
                            ${time.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} 
                        </div>
                    `;
                    container.appendChild(el);
                });

                document.getElementById('reading-count').innerHTML = `${data.length} total readings`;

            } catch (err) {
                console.error(err);
                document.getElementById('recent-list').innerHTML = 
                    `<div class="text-center py-8 text-red-400 text-sm">Failed to load data. Pull to refresh.</div>`;
            }
        }

        // Simple pull-to-refresh for mobile
        let startY = 0;
        let isPulling = false;

        function initPullToRefresh() {
            const container = document.body;

            container.addEventListener('touchstart', (e) => {
                if (window.scrollY === 0) {
                    startY = e.touches[0].clientY;
                    isPulling = true;
                }
            });

            container.addEventListener('touchmove', (e) => {
                if (!isPulling) return;
                const currentY = e.touches[0].clientY;
                if (currentY - startY > 80) {
                    isPulling = false;
                    loadData(true);
                }
            });

            container.addEventListener('touchend', () => {
                isPulling = false;
            });
        }

        // Init
        window.onload = () => {
            loadData();
            initPullToRefresh();

            // Auto refresh every 5 minutes
            setInterval(() => loadData(false), 5 * 60 * 1000);
        };
    </script>
</body>
</html>
