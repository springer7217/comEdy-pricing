<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComEd Pricing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .glass { background: rgba(39, 39, 42, 0.85); backdrop-filter: blur(20px); }
        .price-value { font-variant-numeric: tabular-nums; }
        .skeleton { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        canvas { max-height: 240px !important; }
        .pull-to-refresh {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #71717a;
            font-size: 13px;
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
            z-index: 100;
        }
        .pull-to-refresh.active {
            opacity: 1;
        }
    </style>
</head>
<body class="bg-zinc-950 text-white">
    <div class="max-w-md mx-auto min-h-screen pb-10 relative">
        <!-- Pull to Refresh Indicator -->
        <div id="pull-indicator" class="pull-to-refresh">
            <div class="flex items-center gap-2">
                <svg id="refresh-icon" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.058 11H1M12 3v2m0 16v2m9-9H15m-6 0a8.002 8.002 0 01-3.464-1.06" />
                </svg>
                <span id="pull-text">Pull to refresh</span>
            </div>
        </div>

        <!-- Header -->
        <div class="sticky top-0 z-50 bg-zinc-950/95 backdrop-blur-lg border-b border-zinc-800 px-6 py-4 flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-semibold tracking-tight">ComEd</h1>
                <p class="text-[10px] text-zinc-500 -mt-0.5">ELECTRICITY PRICING</p>
            </div>
            <button onclick="loadData(true)" 
                    class="flex items-center gap-2 px-4 h-9 bg-zinc-900 hover:bg-zinc-800 active:bg-zinc-700 transition-colors rounded-2xl text-sm font-medium border border-zinc-800">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.058 11H1M12 3v2m0 16v2m9-9H15m-6 0a8.002 8.002 0 01-3.464-1.06" />
                </svg>
                <span>Refresh</span>
            </button>
        </div>

        <!-- Current Price -->
        <div class="px-6 pt-6">
            <div id="current-card" class="glass border border-zinc-800 rounded-3xl p-6">
                <div class="flex justify-between items-start">
                    <div>
                        <div class="text-xs tracking-[1px] text-zinc-400 font-medium">NOW</div>
                        <div id="current-price" class="text-[64px] leading-none font-semibold tracking-[-3.5px] mt-2 price-value">--</div>
                        <div id="current-time" class="text-sm text-zinc-500 mt-1">Loading latest price...</div>
                    </div>
                    <div id="current-emoji" class="text-[72px] mt-1 transition-transform">⏳</div>
                </div>
            </div>
        </div>

        <!-- Stats -->
        <div class="px-6 mt-6">
            <div class="flex items-center justify-between px-1 mb-3">
                <div class="text-xs uppercase tracking-widest text-zinc-400 font-medium">Last 24 Hours</div>
            </div>
            
            <div class="grid grid-cols-3 gap-3 mb-4">
                <div class="glass border border-zinc-800 rounded-2xl p-4">
                    <div class="text-emerald-400 text-[10px] font-semibold tracking-wider">AVG</div>
                    <div id="avg-price" class="text-3xl font-semibold tracking-tight mt-1 price-value">--</div>
                </div>
                <div class="glass border border-zinc-800 rounded-2xl p-4">
                    <div class="text-red-400 text-[10px] font-semibold tracking-wider">HIGH</div>
                    <div id="high-price" class="text-3xl font-semibold tracking-tight mt-1 price-value">--</div>
                </div>
                <div class="glass border border-zinc-800 rounded-2xl p-4">
                    <div class="text-sky-400 text-[10px] font-semibold tracking-wider">LOW</div>
                    <div id="low-price" class="text-3xl font-semibold tracking-tight mt-1 price-value">--</div>
                </div>
            </div>

            <!-- Chart -->
            <div class="glass border border-zinc-800 rounded-2xl p-4">
                <canvas id="price-chart"></canvas>
            </div>
        </div>

        <!-- Time Filters -->
        <div class="px-6 mt-6">
            <div class="flex items-center gap-2 px-1 mb-3 flex-wrap">
                <span class="text-xs uppercase tracking-widest text-zinc-400 font-medium mr-1">Show</span>
                <div class="flex flex-wrap gap-1 bg-zinc-900 border border-zinc-800 rounded-2xl p-1 text-sm">
                    <button onclick="filterData(6)" class="filter-btn px-3 py-1 rounded-xl font-medium" data-hours="6">6h</button>
                    <button onclick="filterData(12)" class="filter-btn px-3 py-1 rounded-xl font-medium" data-hours="12">12h</button>
                    <button onclick="filterData(24)" class="filter-btn active px-3 py-1 rounded-xl font-medium bg-white text-zinc-900" data-hours="24">24h</button>
                    <button onclick="filterData(168)" class="filter-btn px-3 py-1 rounded-xl font-medium" data-hours="168">7d</button>
                    <button onclick="filterData(720)" class="filter-btn px-3 py-1 rounded-xl font-medium" data-hours="720">30d</button>
                </button>
            </div>
        </div>

        <!-- Recent Readings -->
        <div class="px-6 mt-2">
            <div class="flex items-baseline justify-between px-1 mb-3">
                <span class="text-sm font-semibold">Recent Readings</span>
                <span id="reading-count" class="text-xs text-zinc-500"></span>
            </div>

            <div id="recent-list" class="space-y-[6px]">
                <!-- Populated by JS -->
            </div>

            <button id="load-more-btn" 
                    onclick="loadMore()"
                    class="mt-4 w-full py-3 bg-zinc-900 hover:bg-zinc-800 active:bg-zinc-700 border border-zinc-800 rounded-2xl text-sm font-medium hidden">
                Load More
            </button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://qgasjpfbzjqlheexlouw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFnYXNqcGZiempxbGhlZXhsb3V3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwMzc2OTgsImV4cCI6MjA5ODYxMzY5OH0.cdZFeiMTV8zoQxgXI9-mLWNxmj9-r2eVoRZt9vfyaSk';

        let chartInstance = null;
        let allData = [];
        let displayedCount = 5;           // Start with 5
        const LOAD_MORE_AMOUNT = 10;      // Load 10 more each time
        let currentFilterHours = 24;

        function getEmoji(price) {
            if (price <= 8.0) return '🟢';
            if (price <= 10.0) return '🟡';
            return '🔴';
        }

        function showSkeleton() {
            document.getElementById('current-price').innerHTML = '<div class="h-16 w-44 bg-zinc-800 rounded-2xl skeleton"></div>';
            document.getElementById('current-emoji').innerHTML = '⏳';
            document.getElementById('avg-price').innerHTML = '--';
            document.getElementById('high-price').innerHTML = '--';
            document.getElementById('low-price').innerHTML = '--';
            document.getElementById('recent-list').innerHTML = 
                '<div class="space-y-2">' + Array(6).fill(0).map(() => 
                    `<div class="h-14 bg-zinc-900 border border-zinc-800 rounded-2xl skeleton"></div>`).join('') + '</div>';
            document.getElementById('load-more-btn').classList.add('hidden');
        }

        async function loadData(showLoading = true) {
            if (showLoading) showSkeleton();

            try {
                const res = await fetch(
                    `${SUPABASE_URL}/rest/v1/comed_prices?select=*&order=recorded_at.desc&limit=2000`,
                    {
                        headers: {
                            apikey: SUPABASE_ANON_KEY,
                            Authorization: `Bearer ${SUPABASE_ANON_KEY}`
                        }
                    }
                );

                if (!res.ok) throw new Error('Failed to fetch');

                allData = await res.json();
                displayedCount = 5; // Reset to 5 when refreshing

                if (allData.length === 0) {
                    document.getElementById('recent-list').innerHTML = '<div class="text-center py-8 text-zinc-500">No data yet</div>';
                    return;
                }

                filterData(currentFilterHours, false);

            } catch (err) {
                console.error(err);
                document.getElementById('recent-list').innerHTML = '<div class="text-center py-8 text-red-400 text-sm">Error loading data</div>';
            }
        }

        function filterData(hours, updateActive = true) {
            if (!allData.length) return;
            currentFilterHours = hours;

            if (updateActive) {
                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active', 'bg-white', 'text-zinc-900'));
                const activeBtn = document.querySelector(`.filter-btn[data-hours="${hours}"]`);
                if (activeBtn) activeBtn.classList.add('active', 'bg-white', 'text-zinc-900');
            }

            const hoursInMs = hours * 60 * 60 * 1000;
            const now = new Date();
            const filtered = allData.filter(row => {
                const recordTime = new Date(row.recorded_at);
                return (now - recordTime) <= hoursInMs;
            });

            if (filtered.length === 0) {
                document.getElementById('recent-list').innerHTML = '<div class="text-center py-6 text-zinc-500 text-sm">No data in this time range</div>';
                document.getElementById('load-more-btn').classList.add('hidden');
                return;
            }

            // Current price
            const latest = allData[0];
            const price = parseFloat(latest.price);
            document.getElementById('current-price').innerHTML = 
                `${price.toFixed(1)}<span class="text-4xl font-normal align-super">¢</span>`;
            document.getElementById('current-emoji').innerHTML = getEmoji(price);
            
            const recorded = new Date(latest.recorded_at);
            document.getElementById('current-time').innerHTML = 
                `Updated ${recorded.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })}`;

            // Stats
            const prices = filtered.map(r => parseFloat(r.price));
            const avg = prices.reduce((a, b) => a + b, 0) / prices.length;
            const high = Math.max(...prices);
            const low = Math.min(...prices);

            document.getElementById('avg-price').innerHTML = avg.toFixed(1) + '¢';
            document.getElementById('high-price').innerHTML = high.toFixed(1) + '¢';
            document.getElementById('low-price').innerHTML = low.toFixed(1) + '¢';

            updateChart(filtered, hours);
            displayedCount = 5; // Reset to 5 when changing filter
            renderRecentList(filtered);
        }

        function renderRecentList(filteredData) {
            const container = document.getElementById('recent-list');
            container.innerHTML = '';

            const toShow = filteredData.slice(0, displayedCount);
            const isLongRange = currentFilterHours > 24;

            toShow.forEach(row => {
                const p = parseFloat(row.price);
                const time = new Date(row.recorded_at);
                
                const el = document.createElement('div');
                el.className = `flex items-center justify-between px-4 py-[13px] bg-zinc-900/70 border border-zinc-800 rounded-2xl`;
                
                let leftContent;
                let rightContent;

                if (isLongRange) {
                    leftContent = `
                        <div class="flex items-center gap-3.5">
                            <span class="text-3xl">${getEmoji(p)}</span>
                            <div>
                                <div class="font-semibold text-xl tracking-tight price-value">${p.toFixed(1)}<span class="text-sm font-normal text-zinc-400">¢</span></div>
                                <div class="text-[10px] text-zinc-500 -mt-0.5">
                                    ${time.toLocaleDateString([], {month:'short', day:'numeric'})} · ${time.toLocaleTimeString([], {hour:'numeric', minute:'2-digit'})}
                                </div>
                            </div>
                        </div>
                    `;
                    rightContent = '';
                } else {
                    leftContent = `
                        <div class="flex items-center gap-3.5">
                            <span class="text-3xl">${getEmoji(p)}</span>
                            <div>
                                <div class="font-semibold text-xl tracking-tight price-value">${p.toFixed(1)}<span class="text-sm font-normal text-zinc-400">¢</span></div>
                            </div>
                        </div>
                    `;
                    rightContent = `
                        <div class="text-right text-xs text-zinc-400 font-mono">
                            ${time.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}
                        </div>
                    `;
                }

                el.innerHTML = leftContent + rightContent;
                container.appendChild(el);
            });

            const loadMoreBtn = document.getElementById('load-more-btn');
            loadMoreBtn.style.display = (filteredData.length > displayedCount) ? 'block' : 'none';

            document.getElementById('reading-count').innerHTML = `${filteredData.length} readings`;
        }

        function loadMore() {
            const activeBtn = document.querySelector('.filter-btn.active');
            const hours = activeBtn ? parseInt(activeBtn.dataset.hours) : 24;
            
            const hoursInMs = hours * 60 * 60 * 1000;
            const now = new Date();
            const filtered = allData.filter(row => {
                const recordTime = new Date(row.recorded_at);
                return (now - recordTime) <= hoursInMs;
            });

            displayedCount += LOAD_MORE_AMOUNT; // Add 10 more
            renderRecentList(filtered);
        }

        function updateChart(data, hours) {
            const ctx = document.getElementById('price-chart');
            if (chartInstance) chartInstance.destroy();

            let labels;

            if (hours <= 24) {
                labels = data.slice().reverse().map(r => {
                    const d = new Date(r.recorded_at);
                    return d.toLocaleTimeString([], { 
                        hour: 'numeric', 
                        minute: '2-digit',
                        hour12: true 
                    });
                });
            } else {
                labels = data.slice().reverse().map(r => {
                    const d = new Date(r.recorded_at);
                    return d.toLocaleDateString([], { 
                        month: 'short', 
                        day: 'numeric' 
                    });
                });
            }

            const prices = data.slice().reverse().map(r => parseFloat(r.price));

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Price (¢)',
                        data: prices,
                        borderColor: '#22c55e',
                        borderWidth: 2.5,
                        tension: 0.25,
                        fill: false,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { color: '#27272a' }, ticks: { color: '#71717a', font: { size: 9 } } },
                        y: { grid: { color: '#27272a' }, ticks: { color: '#71717a', font: { size: 10 } } }
                    }
                }
            });
        }

        // ==================== PULL TO REFRESH ====================
        function initPullToRefresh() {
            const indicator = document.getElementById('pull-indicator');
            const pullText = document.getElementById('pull-text');
            const refreshIcon = document.getElementById('refresh-icon');
            let currentPullDistance = 0;

            document.addEventListener('touchstart', (e) => {
                if (window.scrollY === 0) {
                    startY = e.touches[0].clientY;
                    isPulling = true;
                    currentPullDistance = 0;
                }
            });

            document.addEventListener('touchmove', (e) => {
                if (!isPulling) return;

                const currentY = e.touches[0].clientY;
                currentPullDistance = currentY - startY;

                if (currentPullDistance > 0) {
                    const progress = Math.min(currentPullDistance / 80, 1);
                    indicator.style.opacity = progress * 0.8;
                    indicator.style.transform = `translateY(${Math.min(currentPullDistance * 0.5, 40)}px)`;

                    if (currentPullDistance > 80) {
                        pullText.textContent = 'Release to refresh';
                        refreshIcon.style.transform = 'rotate(180deg)';
                    } else {
                        pullText.textContent = 'Pull to refresh';
                        refreshIcon.style.transform = 'rotate(0deg)';
                    }
                }
            });

            document.addEventListener('touchend', () => {
                if (!isPulling) return;

                if (currentPullDistance > 80) {
                    pullText.textContent = 'Refreshing...';
                    refreshIcon.style.transform = 'rotate(0deg)';
                    indicator.style.transition = 'opacity 0.3s ease';

                    loadData(true).finally(() => {
                        setTimeout(() => {
                            indicator.style.transition = 'opacity 0.2s ease';
                            indicator.style.opacity = '0';
                            indicator.style.transform = 'translateY(0)';
                            pullText.textContent = 'Pull to refresh';
                            refreshIcon.style.transform = 'rotate(0deg)';
                        }, 300);
                    });
                } else {
                    indicator.style.transition = 'opacity 0.2s ease, transform 0.2s ease';
                    indicator.style.opacity = '0';
                    indicator.style.transform = 'translateY(0)';
                }

                isPulling = false;
                currentPullDistance = 0;
            });
        }

        window.onload = () => {
            loadData();
            initPullToRefresh();
            setInterval(() => loadData(false), 5 * 60 * 1000);
        };
    </script>
</body>
</html>
